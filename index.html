<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CFS-Bank — Mein Konto</title>
<style>
  :root{
    --brand:#0f3a63;
    --accent:#1466a6;
    --bg:#f4f6f8;
    --card:#ffffff;
    --muted:#6b7280;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg); color:#111}
  header{background:linear-gradient(90deg,var(--brand),var(--accent)); color:#fff; padding:18px 20px; box-shadow:0 2px 6px rgba(10,10,20,.06)}
  header h1{margin:0; font-size:20px; font-weight:600}
  .container{max-width:920px; margin:30px auto; padding:16px}
  .grid{display:grid; grid-template-columns: 1fr; gap:18px}
  .card{background:var(--card); border-radius:10px; padding:18px; box-shadow:0 6px 18px rgba(12,20,40,0.04)}
  label{display:block; font-size:13px; color:var(--muted); margin-top:10px}
  input[type="text"], input[type="password"], input[type="number"]{
    width:100%; padding:12px 14px; margin-top:8px; border:1px solid #e6e9ee; border-radius:8px;
    font-size:15px; outline:none;
  }
  .actions{display:flex; gap:10px; margin-top:14px}
  button{background:var(--brand); color:#fff; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:600;}
  button.secondary{background:#58616a}
  .muted{color:var(--muted); font-size:13px}
  .error{color:#b00020; margin-top:10px}
  .info-line{margin:8px 0; font-size:15px}
  .account-value{font-weight:700; font-size:18px}
  ul{padding-left:20px; margin:6px 0;}
  li{margin-bottom:6px;}
  .tx-date{color:#666; font-size:12px; margin-right:8px;}
  @media(min-width:700px){ .grid{grid-template-columns: 1fr 380px} }
  footer{margin-top:18px; text-align:center; color:var(--muted); font-size:13px}
</style>
</head>
<body>
<header>
  <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between">
    <h1>CFS-Bank — Kundenbereich</h1>
  </div>
</header>

<main class="container">
  <div class="grid">
    <!-- Login-Panel -->
    <section class="card" id="loginSection" aria-live="polite">
      <h2 style="margin:0 0 6px 0">Kunden-Login</h2>
      <div class="muted">Bitte Kontonummer und PIN eingeben, um dein Konto sicher einzusehen.</div>

      <label for="kontoInput">Kontonummer</label>
      <input id="kontoInput" type="text" inputmode="numeric" autocomplete="off" placeholder="deine Kontonummer" />

      <label for="pinInput">PIN</label>
      <input id="pinInput" type="password" autocomplete="current-password" placeholder="deine Geheimzahl" />

      <div class="actions">
        <button id="loginBtn">Einloggen</button>
        <button id="clearBtn" class="secondary" type="button">Eingaben löschen</button>
      </div>

      <div id="message" class="error" style="display:none"></div>
    </section>

    <!-- Account-Panel -->
    <aside class="card" id="accountSection" style="display:none">
      <h3 style="margin:0 0 8px 0">Kontoinformation</h3>
      <div id="accountContent" class="account-area">
        <!-- Füllt sich dynamisch -->
        <div class="muted">Bitte melde dich zuerst an.</div>
      </div>
      <div style="margin-top:12px; display:flex; justify-content:flex-end">
        <button id="logoutBtn" class="secondary">Abmelden</button>
      </div>
    </aside>
  </div>

  <footer class="card muted" style="margin-top:18px">
    Kundenbereich der CFS-Bank — PIN-Daten werden auf dieser Seite niemals angezeigt. PIN-Abfragen sind nur am Bankschalter möglich.
  </footer>
</main>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script>
/* -----------------------------
   KONFIGURATION — deine Supabase-Daten
   ----------------------------- */
const SUPABASE_URL = "https://urgciggvwrzyzwscmxlq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyZ2NpZ2d2d3J6eXp3c2NteGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODgzNTIsImV4cCI6MjA4ODY2NDM1Mn0.WWHigzYPZvg9SSV49YEhv3gSU7rXUoL80gWxzmCL098";

/* sichere Supabase-Client-Erstellung (vermeidet "already been declared") */
const supabaseClient = window.supabaseClient || (typeof supabase !== 'undefined' ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null);
if (!window.supabaseClient && supabaseClient) window.supabaseClient = supabaseClient;

/* Falls Supabase nicht geladen ist: freundlich abbrechen */
if (!supabaseClient) {
  document.body.innerHTML = '<div style="padding:24px"><h2>Fehler</h2><p>Supabase-SDK konnte nicht geladen werden. Bitte Internetverbindung prüfen.</p></div>';
  throw new Error('Supabase SDK not found');
}

/* DOM-Elemente */
const kontoInput = document.getElementById('kontoInput');
const pinInput = document.getElementById('pinInput');
const loginBtn = document.getElementById('loginBtn');
const clearBtn = document.getElementById('clearBtn');
const messageEl = document.getElementById('message');
const accountSection = document.getElementById('accountSection');
const accountContent = document.getElementById('accountContent');
const logoutBtn = document.getElementById('logoutBtn');
const loginSection = document.getElementById('loginSection');

let currentAccount = null;

/* Hilfsfunktionen (UI) */
function showMessage(text){
  messageEl.style.display = 'block';
  messageEl.textContent = text;
}
function clearMessage(){
  messageEl.style.display = 'none';
  messageEl.textContent = '';
}
function setLoading(on){
  loginBtn.disabled = on;
  clearBtn.disabled = on;
  loginBtn.textContent = on ? 'Bitte warten…' : 'Einloggen';
}

/* XSS-sicherer Escape */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* LOGIN-Funktion */
async function login(){
  clearMessage();
  const kontoRaw = kontoInput.value.trim();
  const pinRaw = pinInput.value.trim();

  if(!kontoRaw){ showMessage('Bitte Kontonummer eingeben.'); kontoInput.focus(); return; }
  if(!pinRaw){ showMessage('Bitte PIN eingeben.'); pinInput.focus(); return; }

  const kontoNum = Number.parseInt(kontoRaw, 10);
  if(Number.isNaN(kontoNum)){ showMessage('Kontonummer muss eine Zahl sein.'); kontoInput.focus(); return; }

  setLoading(true);

  try {
    // Lade nur die benötigten Spalten aus accounts (PIN wird zur Prüfung verwendet, aber danach nicht angezeigt)
    const { data: accData, error: accError } = await supabaseClient
      .from('accounts')
      .select('Name, Konto, Geld, pin')
      .eq('Konto', kontoNum)
      .maybeSingle();

    if(accError){
      console.error('Supabase error (accounts):', accError);
      showMessage('Datenbankfehler beim Einloggen. Bitte melde dich am Bankschalter.');
      setLoading(false);
      return;
    }

    if(!accData){
      showMessage('Kontonummer oder PIN falsch.');
      setLoading(false);
      return;
    }

    // PIN prüfen (pin-Spalte ist kleingeschrieben in deiner DB)
    if(String(accData.pin).trim() !== pinRaw){
      showMessage('Kontonummer oder PIN falsch.');
      setLoading(false);
      return;
    }

    // Login erfolgreich: erstelle lokales Objekt OHNE PIN
    currentAccount = {
      Name: accData.Name ?? '(kein Name)',
      Konto: accData.Konto,
      Geld: accData.Geld ?? 0
    };

    // UI wechseln
    loginSection.style.display = 'none';
    accountSection.style.display = 'block';
    clearMessage();

    // Render Basisinformationen + Transaktionen
    await loadAndRenderAccount();

  } catch (err) {
    console.error('Login exception:', err);
    showMessage('Unerwarteter Fehler. Bitte später erneut versuchen.');
  } finally {
    setLoading(false);
    // PIN aus Sicherheitsgründen löschen
    pinInput.value = '';
  }
}

/* Lade Transaktionen und zeige Konto + Verlauf an */
async function loadAndRenderAccount(){
  if(!currentAccount) return;

  // Transaktionen laden; Spalten exakt so wie in deiner Tabelle:
  const { data: txData, error: txError } = await supabaseClient
    .from('transactions')
    .select('Shopname, Amount, created_at')
    .eq('Konto', currentAccount.Konto)
    .order('created_at', { ascending: false });

  if(txError){
    console.error('Supabase error (transactions):', txError);
    // trotzdem Basiskonto anzeigen
  }

  // Basis-Kontoinfos
  let html = '';
  html += `<div class="info-line"><strong>Name:</strong> <span class="account-value">${escapeHtml(currentAccount.Name)}</span></div>`;
  html += `<div class="info-line"><strong>Kontonummer:</strong> <span class="account-value">${escapeHtml(String(currentAccount.Konto))}</span></div>`;
  html += `<div class="info-line"><strong>Guthaben:</strong> <span class="account-value">${escapeHtml(String(currentAccount.Geld))} €</span></div>`;

  // Kaufverlauf-Anzeige
  html += `<div style="margin-top:12px;"><strong>Letzte Käufe</strong></div>`;
  if(!txData || txData.length === 0){
    html += `<div class="muted" style="margin-top:8px">Keine Käufe vorhanden.</div>`;
  } else {
    html += '<ul style="margin-top:8px">';
    for(const t of txData){
      // created_at ist klein geschrieben in deiner Tabelle
      const dateStr = t.created_at ? new Date(t.created_at).toLocaleString() : '';
      const shop = t.Shopname ?? '(kein Shopname)';
      const amount = t.Amount !== undefined && t.Amount !== null ? t.Amount : '(kein Betrag)';
      html += `<li><span class="tx-date">${escapeHtml(dateStr)}</span> ${escapeHtml(shop)} — <strong>${escapeHtml(String(amount))} €</strong></li>`;
    }
    html += '</ul>';
  }

  html += `<div class="muted" style="margin-top:10px">Hinweis: Die PIN ist nur am Bankschalter (CFS-Bank) einsehbar.</div>`;

  accountContent.innerHTML = html;
}

/* LOGOUT */
function logout(){
  currentAccount = null;
  accountContent.innerHTML = '<div class="muted">Bitte melde dich zuerst an.</div>';
  accountSection.style.display = 'none';
  loginSection.style.display = 'block';
  clearMessage();
  kontoInput.value = '';
  pinInput.value = '';
  kontoInput.focus();
}

/* Events */
loginBtn.addEventListener('click', login);
clearBtn.addEventListener('click', ()=>{ kontoInput.value=''; pinInput.value=''; clearMessage(); kontoInput.focus(); });
logoutBtn.addEventListener('click', logout);
pinInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') login(); });

/* initial focus */
kontoInput.focus();
</script>
</body>
</html>
